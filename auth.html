<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="robots" content="noindex, nofollow">
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Energy with Jess - Learning Portal</title>
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;1,300;1,400&family=Belleza&display=swap" rel="stylesheet" />
<style>
  :root {
    --primary: #3B5E6E;
    --secondary: #bf4288;
    --light: #FAF7F2;
    --dark: #1E2E32;
    --highlight: #C4B0D4;
    --border: #E4EAEC;
    --text-mid: #4A5E63;
    --text-light: #8A9FA5;
    --font-heading: 'Cormorant Garamond', serif;
    --font-body: 'Belleza', sans-serif;
    --radius: 20px;
    --radius-sm: 12px;
    --radius-full: 9999px;
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    font-family: var(--font-body);
    background: linear-gradient(135deg, #f0eaf8 0%, #faf7f2 45%, #e8f0f4 100%);
    min-height: 100vh;
    display: flex;
    align-items: center;
    justify-content: center;
    padding: 24px;
  }

  .auth-card {
    background: #fff;
    border-radius: var(--radius);
    box-shadow: 0 8px 40px rgba(30,46,50,0.13);
    width: 100%;
    max-width: 420px;
    overflow: hidden;
  }

  .auth-header {
    background: linear-gradient(135deg, var(--primary) 0%, #4d7a8e 60%, var(--highlight) 100%);
    padding: 34px 36px 28px;
    text-align: center;
  }

  .auth-header .logo {
    font-size: 30px;
    color: rgba(255,255,255,0.9);
    margin-bottom: 10px;
  }

  .auth-header h1 {
    font-family: var(--font-heading);
    font-size: 28px;
    color: #fff;
    font-weight: 300;
    line-height: 1.2;
    margin-bottom: 4px;
  }

  .auth-header p {
    font-family: var(--font-body);
    font-size: 11px;
    color: rgba(255,255,255,0.65);
    letter-spacing: 2px;
    text-transform: uppercase;
    font-weight: 700;
  }

  .auth-tabs {
    display: flex;
    border-bottom: 1px solid var(--border);
  }

  .auth-tab {
    flex: 1;
    padding: 14px;
    font-family: var(--font-body);
    font-size: 11px;
    font-weight: 700;
    letter-spacing: 1.5px;
    text-transform: uppercase;
    text-align: center;
    cursor: pointer;
    color: var(--text-light);
    background: none;
    border: none;
    border-bottom: 2px solid transparent;
    transition: all 0.2s;
  }

  .auth-tab.active {
    color: var(--primary);
    border-bottom-color: var(--primary);
  }

  .auth-body {
    padding: 28px 36px 24px;
  }

  .auth-form { display: none; }
  .auth-form.active { display: block; }

  .form-group { margin-bottom: 16px; }

  .form-group label {
    display: block;
    font-family: var(--font-body);
    font-size: 10px;
    font-weight: 700;
    letter-spacing: 1.5px;
    text-transform: uppercase;
    color: var(--text-mid);
    margin-bottom: 7px;
  }

  .form-group input {
    width: 100%;
    padding: 12px 16px;
    border: 1px solid var(--border);
    border-radius: var(--radius-sm);
    font-family: var(--font-body);
    font-size: 14px;
    color: var(--dark);
    background: var(--light);
    outline: none;
    transition: border-color 0.2s, background 0.2s;
  }

  .form-group input:focus {
    border-color: var(--primary);
    background: #fff;
  }

  .btn-auth {
    width: 100%;
    padding: 14px;
    background: var(--secondary);
    color: #fff;
    border: none;
    border-radius: var(--radius-full);
    font-family: var(--font-body);
    font-size: 14px;
    font-weight: 700;
    letter-spacing: 0.5px;
    cursor: pointer;
    transition: all 0.2s;
    margin-top: 6px;
  }

  .btn-auth:hover { background: #d94f67; transform: translateY(-1px); }
  .btn-auth:disabled { opacity: 0.6; cursor: not-allowed; transform: none; }

  .auth-error {
    background: #fce8ed;
    border: 1px solid #f5b8c4;
    border-radius: var(--radius-sm);
    padding: 10px 14px;
    font-family: var(--font-body);
    font-size: 13px;
    color: #c0354e;
    margin-bottom: 16px;
    display: none;
    line-height: 1.5;
  }

  .auth-error.show { display: block; }
  .auth-error.success { background: #e8f4f0; border-color: #a8d8c8; color: #1a6e52; }

  .auth-footer {
    text-align: center;
    padding: 0 36px 28px;
    font-family: var(--font-body);
    font-size: 12px;
    color: var(--text-light);
    line-height: 1.6;
  }

  .auth-footer a {
    color: var(--primary);
    text-decoration: none;
    font-weight: 700;
  }

  .auth-footer a:hover { text-decoration: underline; }

  @media (max-width: 480px) {
    .auth-header { padding: 26px 24px 22px; }
    .auth-body { padding: 22px 24px 20px; }
    .auth-footer { padding: 0 24px 24px; }
  }

  .colour-picker {
    display: flex;
    gap: 10px;
    flex-wrap: wrap;
    margin-top: 4px;
  }
  .colour-swatch {
    width: 30px;
    height: 30px;
    border-radius: 50%;
    cursor: pointer;
    border: 3px solid transparent;
    transition: transform 0.15s, border-color 0.15s;
  }
  .colour-swatch.selected {
    border-color: var(--dark);
    transform: scale(1.2);
  }
  .colour-swatch:hover { transform: scale(1.1); }
</style>
</head>
<body>

<div class="auth-card">

  <div class="auth-header">
    <div class="logo">✦</div>
    <h1>Energy with Jess</h1>
    <p>Learning Portal</p>
  </div>

  <div class="auth-tabs">
    <button class="auth-tab active" id="tab-login" onclick="switchTab('login')">Sign In</button>
    <button class="auth-tab" id="tab-register" onclick="switchTab('register')">Create Account</button>
  </div>

  <div class="auth-body">

    <!-- ── LOGIN ── -->
    <form class="auth-form active" id="form-login" onsubmit="handleLogin(event)">
      <div class="auth-error" id="login-error"></div>
      <div class="form-group">
        <label>Email</label>
        <input type="email" id="login-email" placeholder="your@email.com" required autocomplete="email" />
      </div>
      <div class="form-group">
        <label>Password</label>
        <input type="password" id="login-password" placeholder="••••••••" required autocomplete="current-password" />
      </div>
      <button type="submit" class="btn-auth" id="btn-login">Sign In</button>
    </form>

    <!-- ── REGISTER ── -->
    <form class="auth-form" id="form-register" onsubmit="handleRegister(event)">
      <div class="auth-error" id="register-error"></div>
      <div class="form-group">
        <label>Your First Name</label>
        <input type="text" id="reg-name" placeholder="First name" required autocomplete="given-name" />
      </div>
      <div class="form-group">
        <label>Email</label>
        <input type="email" id="reg-email" placeholder="your@email.com" required autocomplete="email" />
      </div>
      <div class="form-group">
        <label>Password</label>
        <input type="password" id="reg-password" placeholder="Min. 6 characters" required autocomplete="new-password" />
      </div>
      <div class="form-group">
        <label>Confirm Password</label>
        <input type="password" id="reg-confirm" placeholder="Same as above" required autocomplete="new-password" />
      </div>
      <div class="form-group">
        <label>Your Colour</label>
        <div class="colour-picker">
          <div class="colour-swatch selected" style="background:#3B5E6E;" data-colour="#3B5E6E" onclick="selectColour(this)"></div>
          <div class="colour-swatch" style="background:#bf4288;" data-colour="#bf4288" onclick="selectColour(this)"></div>
          <div class="colour-swatch" style="background:#7B5EA7;" data-colour="#7B5EA7" onclick="selectColour(this)"></div>
          <div class="colour-swatch" style="background:#2D7A5C;" data-colour="#2D7A5C" onclick="selectColour(this)"></div>
          <div class="colour-swatch" style="background:#2563A8;" data-colour="#2563A8" onclick="selectColour(this)"></div>
          <div class="colour-swatch" style="background:#E07A30;" data-colour="#E07A30" onclick="selectColour(this)"></div>
          <div class="colour-swatch" style="background:#C4383A;" data-colour="#C4383A" onclick="selectColour(this)"></div>
          <div class="colour-swatch" style="background:#D4A820;" data-colour="#D4A820" onclick="selectColour(this)"></div>
        </div>
      </div>
      <button type="submit" class="btn-auth" id="btn-register">Create Account</button>
    </form>

  </div>

  <div class="auth-footer">
    Forgot your password?
    <a href="#" onclick="handleForgotPassword(event)">Reset it here</a>
  </div>

</div>

<!-- Firebase SDKs -->
<script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-auth-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore-compat.js"></script>

<script>
// ══ FIREBASE CONFIG ══
// Replace ALL values below with your Firebase project config
// (Instructions in firebase-setup.md)
const firebaseConfig = {
  apiKey:            "AIzaSyBErHDdakJYLGjAVADJM__mNxnNOy7cEa0",
  authDomain:        "energy-with-jess-lms.firebaseapp.com",
  projectId:         "energy-with-jess-lms",
  storageBucket:     "energy-with-jess-lms.firebasestorage.app",
  messagingSenderId: "974191871270",
  appId:             "1:974191871270:web:9836a77d4cd403e6226de7"
};

if (!firebase.apps.length) firebase.initializeApp(firebaseConfig);
const auth = firebase.auth();
const db   = firebase.firestore();

function selectColour(el) {
  document.querySelectorAll('.colour-swatch').forEach(s => s.classList.remove('selected'));
  el.classList.add('selected');
}

// Read URL params
// ?mode=register  - open register tab
// ?courses=0      - enroll in course 0 after login/register
// ?courses=1,2    - enroll in multiple courses (e.g. bundle)
const urlParams = new URLSearchParams(window.location.search);
if (urlParams.get('mode') === 'register') switchTab('register');
const coursesToEnroll = urlParams.get('courses')
  ? urlParams.get('courses').split(',').map(Number).filter(n => !isNaN(n))
  : [];

// After login or register - save enrollment then redirect to LMS
auth.onAuthStateChanged(async user => {
  if (!user) return;
  if (coursesToEnroll.length > 0) {
    try {
      await db.collection('users').doc(user.uid).set(
        { enrolledCourses: firebase.firestore.FieldValue.arrayUnion(...coursesToEnroll) },
        { merge: true }
      );
    } catch (e) { /* non-fatal - redirect anyway */ }
  }
  window.location.href = 'energy-with-jess-lms.html';
});

// ── Tab switch ──
function switchTab(tab) {
  document.querySelectorAll('.auth-tab').forEach(t => t.classList.remove('active'));
  document.querySelectorAll('.auth-form').forEach(f => f.classList.remove('active'));
  document.getElementById('tab-' + tab).classList.add('active');
  document.getElementById('form-' + tab).classList.add('active');
}

// ── Error helpers ──
function showError(formId, msg, isSuccess) {
  const el = document.getElementById(formId + '-error');
  el.textContent = msg;
  el.classList.toggle('success', !!isSuccess);
  el.classList.add('show');
}
function clearError(formId) {
  const el = document.getElementById(formId + '-error');
  el.classList.remove('show', 'success');
}

function friendlyError(code) {
  const map = {
    'auth/user-not-found':      'No account found with that email.',
    'auth/wrong-password':      'Incorrect password. Try again.',
    'auth/invalid-credential':  'Incorrect email or password.',
    'auth/invalid-email':       'Please enter a valid email address.',
    'auth/too-many-requests':   'Too many attempts. Try again in a few minutes.',
    'auth/email-already-in-use':'An account with that email already exists. Sign in instead.',
    'auth/weak-password':       'Password must be at least 6 characters.',
  };
  return map[code] || 'Something went wrong. Please try again.';
}

// ── Login ──
async function handleLogin(e) {
  e.preventDefault();
  clearError('login');
  const btn = document.getElementById('btn-login');
  btn.disabled = true;
  btn.textContent = 'Signing in...';
  try {
    await auth.signInWithEmailAndPassword(
      document.getElementById('login-email').value.trim(),
      document.getElementById('login-password').value
    );
    // onAuthStateChanged handles redirect
  } catch (err) {
    showError('login', friendlyError(err.code));
    btn.disabled = false;
    btn.textContent = 'Sign In';
  }
}

// ── Register ──
async function handleRegister(e) {
  e.preventDefault();
  clearError('register');
  const name     = document.getElementById('reg-name').value.trim();
  const email    = document.getElementById('reg-email').value.trim();
  const password = document.getElementById('reg-password').value;
  const confirm  = document.getElementById('reg-confirm').value;

  if (password !== confirm) {
    showError('register', 'Passwords don\'t match.');
    return;
  }

  const btn = document.getElementById('btn-register');
  btn.disabled = true;
  btn.textContent = 'Creating account...';

  try {
    const cred = await auth.createUserWithEmailAndPassword(email, password);
    await cred.user.updateProfile({ displayName: name });
    const colour = document.querySelector('.colour-swatch.selected')?.dataset.colour || '#3B5E6E';
    await db.collection('users').doc(cred.user.uid).set({ firstName: name, colour }, { merge: true });
    // onAuthStateChanged handles redirect
  } catch (err) {
    showError('register', friendlyError(err.code));
    btn.disabled = false;
    btn.textContent = 'Create Account';
  }
}

// ── Forgot password ──
async function handleForgotPassword(e) {
  e.preventDefault();
  const email = document.getElementById('login-email').value.trim();
  if (!email) {
    showError('login', 'Enter your email address above first.');
    return;
  }
  try {
    await auth.sendPasswordResetEmail(email);
    showError('login', 'Password reset email sent - check your inbox.', true);
  } catch (err) {
    showError('login', friendlyError(err.code));
  }
}
</script>
</body>
</html>
